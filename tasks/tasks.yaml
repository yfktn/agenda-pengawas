epics:
  - id: E-01
    name: Foundation — Setup Proyek & Auth
  - id: E-02
    name: Master Data Management
  - id: E-03
    name: Agenda Management & Dokumentasi
  - id: E-04
    name: Q&A System
  - id: E-05
    name: Dashboard & Reporting

tasks:
  - id: T-001
    title: Setup Laravel + Filament + Dependencies
    description: >
      Buat proyek Laravel 12 baru, install Filament 5, dan seluruh dependencies
      yang diperlukan (spatie/laravel-permission, barryvdh/laravel-dompdf,
      spatie/laravel-activitylog). Konfigurasi database SQLite untuk development.
    epic: E-01
    priority: high
    depends_on: []
    acceptance_criteria:
      - Proyek Laravel dapat diakses via browser
      - Filament 5 terinstall dan halaman default panel muncul
      - Semua package terdaftar di composer.json
      - Database SQLite terkoneksi dan migration pertama berjalan
    status: completed

  - id: T-002
    title: Setup Database Migration untuk Semua Entitas
    description: >
      Buat migration untuk seluruh 11 entitas: User (tambah field role, sekolah_id),
      MasterSekolah, PenugasanPengawas, Agenda, AgendaPeserta, AgendaSekolah,
      Gallery, File, LogAktivitas, Pertanyaan, Jawaban.
    epic: E-01
    priority: high
    depends_on: [T-001]
    acceptance_criteria:
      - Semua migration tersedia di database/migrations/
      - Relasi foreign key sesuai dengan data model di architecture.md
      - php artisan migrate berjalan tanpa error
    status: completed

  - id: T-003
    title: Implementasi Autentikasi Login via Filament
    description: >
      Setting autentikasi email & password menggunakan Filament default auth.
      Setup form login, reset password, dan proteksi route.
    epic: E-01
    priority: high
    depends_on: [T-002]
    acceptance_criteria:
      - User dapat login dengan email dan password
      - User yang belum login diarahkan ke halaman login
      - Fitur logout berfungsi
    status: completed

  - id: T-004
    title: Setup RBAC dengan Middleware + Multi-Panel
    description: >
      Implementasi RBAC manual via CheckRole middleware dan 3 Filament Panel
      terpisah. Panel: Admin (/admin), Supervisory (/supervisory), School (/school).
      Masing-masing panel memiliki middleware yang memeriksa role user.
      Spatie Permission terinstall tapi tidak digunakan — RBAC via kolom `role`.
    epic: E-01
    priority: high
    depends_on: [T-003]
    acceptance_criteria:
      - Role Admin, Pengawas, OperatorSekolah tersedia (kolom role di users)
      - Middleware CheckRole memblokir akses ke panel yang bukan role-nya
      - User diarahkan ke panel sesuai role
      - Tiga Filament Panel terpisah dengan route prefix berbeda
    status: completed

  - id: T-005
    title: (Merged ke T-004) Setup Multi-Panel Filament
    description: >
      Multi-panel sudah diimplementasikan bersamaan dengan RBAC di T-004.
    epic: E-01
    priority: high
    depends_on: [T-004]
    acceptance_criteria: []
    status: completed

  - id: T-006
    title: CRUD Master Sekolah (Admin Panel)
    description: >
      Buat Filament Resource untuk MasterSekolah di AdminPanel. Fitur CRUD
      dengan field: NISN (unique), Nama Sekolah, Alamat. Implementasi validasi
      input dan form yang user-friendly.
    epic: E-02
    priority: high
    depends_on: [T-005]
    acceptance_criteria:
      - Admin dapat melihat daftar sekolah
      - Admin dapat membuat, mengubah, dan menghapus sekolah
      - NISN bersifat unique dan tervalidasi
      - Search & filter di tabel sekolah
    status: completed

  - id: T-007
    title: CRUD User dengan Pemilihan Role (Admin Panel)
    description: >
      Buat Filament Resource untuk User di AdminPanel. Fitur CRUD dengan field:
      name, email, password (hash otomatis), role (select: Admin/Pengawas/OperatorSekolah),
      sekolah_id (hanya muncul jika role = OperatorSekolah).
    epic: E-02
    priority: high
    depends_on: [T-005]
    acceptance_criteria:
      - Admin dapat membuat user baru dengan role apa pun
      - Password ter-hash saat disimpan
      - Field sekolah_id muncul secara kondisional hanya untuk role OperatorSekolah
      - Admin dapat mengubah data user dan reset password
      - Admin dapat menghapus user
    status: pending

  - id: T-008
    title: CRUD Penugasan Pengawas ke Sekolah (Admin Panel)
    description: >
      Buat Filament Resource untuk PenugasanPengawas di AdminPanel.
      Relasi many-to-mana antara User (Pengawas) dan MasterSekolah.
      Gunakan form select dengan multiple atau checkbox.
    epic: E-02
    priority: high
    depends_on: [T-006, T-007]
    acceptance_criteria:
      - Admin dapat memilih Pengawas dan menugaskannya ke satu atau lebih sekolah
      - Admin dapat melihat daftar penugasan yang sudah dibuat
      - Admin dapat mengubah dan menghapus penugasan
      - Relasi many-to-many tersimpan dengan benar
    status: pending

  - id: T-009
    title: CRUD Agenda — Create & Read (Supervisory Panel)
    description: >
      Buat Filament Resource untuk Agenda di SupervisoryPanel. Fitur create
      dengan field: judul, deskripsi, tanggal_mulai, tanggal_berakhir
      (datetime picker). Tampilkan daftar agenda milik pengawas yang login.
    epic: E-03
    priority: high
    depends_on: [T-005]
    acceptance_criteria:
      - Pengawas dapat membuat agenda baru dengan semua field wajib
      - Daftar agenda hanya menampilkan agenda milik pengawas yang login
      - Search & filter berdasarkan tanggal dan judul
      - Validasi tanggal_berakhir tidak boleh sebelum tanggal_mulai
    status: pending

  - id: T-010
    title: CRUD Agenda — Edit & Delete (Supervisory Panel)
    description: >
      Implementasi edit dan soft delete pada Agenda. Hanya pemilik agenda
      (created_by) yang bisa mengubah atau menghapus agendanya sendiri.
    epic: E-03
    priority: high
    depends_on: [T-009]
    acceptance_criteria:
      - Pengawas dapat mengubah agenda miliknya
      - Pengawas dapat menghapus agenda miliknya (soft delete)
      - Pengawas lain tidak bisa mengubah/menghapus agenda yang bukan miliknya
      - Notifikasi sukses saat edit/delete
    status: pending

  - id: T-011
    title: Tag Peserta (Pengawas) pada Agenda
    description: >
      Implementasi many-to-many Agenda ke User (Pengawas) melalui tabel
      AgendaPeserta. Pengawas dapat menandai pengawas lain sebagai peserta
      saat membuat/mengedit agenda. Gunakan multi-select dengan search.
    epic: E-03
    priority: high
    depends_on: [T-009]
    acceptance_criteria:
      - Pengawas dapat memilih pengawas lain sebagai peserta agenda
      - Data tersimpan di tabel pivot AgendaPeserta
      - Peserta yang ditandai bisa melihat agenda tersebut
    status: pending

  - id: T-012
    title: Tag Sekolah pada Agenda
    description: >
      Implementasi many-to-many Agenda ke MasterSekolah melalui tabel
      AgendaSekolah. Pengawas dapat menandai sekolah yang terlibat saat
      membuat/mengedit agenda.
    epic: E-03
    priority: high
    depends_on: [T-009]
    acceptance_criteria:
      - Pengawas dapat memilih satu atau lebih sekolah yang terlibat
      - Data tersimpan di tabel pivot AgendaSekolah
      - Operator Sekolah dari sekolah yang ditandai bisa melihat agenda
    status: pending

  - id: T-013
    title: Upload Multiple Foto Gallery pada Agenda
    description: >
      Implementasi upload multiple foto ke Gallery. Validasi tipe file
      (jpg, png, webp) dan ukuran (max 10MB). Tampilkan preview foto
      di detail agenda. Gunakan komponen FileUpload Filament.
    epic: E-03
    priority: high
    depends_on: [T-009]
    acceptance_criteria:
      - Pengawas dapat upload 1+ foto saat membuat/mengedit agenda
      - File tervalidasi tipe (jpg/png/webp) dan ukuran (max 10MB)
      - Foto tampil sebagai gallery preview di detail agenda
      - Admin dapat menghapus foto dari gallery
    status: pending

  - id: T-014
    title: Upload Multiple File Dokumen pada Agenda
    description: >
      Implementasi upload multiple file dokumen ke Agenda. Validasi tipe
      file (pdf, doc, docx, xls, xlsx) dan ukuran (max 10MB). Tampilkan
      daftar file dengan tombol download di detail agenda.
    epic: E-03
    priority: high
    depends_on: [T-009]
    acceptance_criteria:
      - Pengawas dapat upload 1+ file saat membuat/mengedit agenda
      - File tervalidasi tipe dan ukuran
      - Daftar file tampil dengan nama file, tipe, dan ukuran
      - File dapat di-download oleh pengguna yang memiliki akses
      - Admin dapat menghapus file
    status: pending

  - id: T-015
    title: Implementasi Activity Log untuk Agenda
    description: >
      Setup Spatie Activitylog untuk mencatat setiap perubahan pada Agenda.
      Catat action (created/updated/deleted) beserta old_data dan new_data
      dalam format JSON. Tampilkan log di detail agenda.
    epic: E-03
    priority: medium
    depends_on: [T-009]
    acceptance_criteria:
      - Setiap create/update/delete agenda tercatat otomatis
      - Log mencatat user yang melakukan perubahan
      - Old dan new data tersimpan dalam format JSON
      - Riwayat perubahan tampil di halaman detail agenda
    status: pending

  - id: T-016
    title: Operator Sekolah Melihat Agenda & Membuat Pertanyaan
    description: >
      Di SchoolPanel, Operator Sekolah dapat melihat daftar agenda yang
      menandai sekolahnya (read-only). Buat Fitur Pertanyaan: operator
      dapat membuat pertanyaan dengan judul dan isi, otomatis terarah
      ke pengawas binaan sekolahnya.
    epic: E-04
    priority: high
    depends_on: [T-011, T-012]
    acceptance_criteria:
      - Operator hanya melihat agenda yang menandai sekolahnya
      - Operator dapat membuat pertanyaan baru
      - Pertanyaan otomatis terarah ke pengawas binaan sekolah
      - Daftar pertanyaan menampilkan status (dijawab/belum)
    status: pending

  - id: T-017
    title: Pengawas Menjawab Pertanyaan & Threaded Conversation
    description: >
      Di SupervisoryPanel, Pengawas melihat daftar pertanyaan masuk dari
      operator sekolah binaan. Implementasi jawaban dan tampilan history
      tanya jawab dalam bentuk threaded conversation (kronologis).
    epic: E-04
    priority: high
    depends_on: [T-016]
    acceptance_criteria:
      - Pengawas melihat pertanyaan dari operator sekolah binaannya
      - Pengawas dapat menulis dan mengirim jawaban
      - History tanya jawab tampil kronologis (terbaru di bawah)
      - Operator sekolah dapat melihat jawaban di panelnya
    status: pending

  - id: T-018
    title: Dashboard Kalender Bulanan
    description: >
      Buat widget dashboard kalender menggunakan FullCalendar di ketiga panel.
      Kalender menampilkan agenda-agenda yang relevan per role. Tanggal yang
      memiliki agenda ditandai, klik tanggal menampilkan daftar agenda.
    epic: E-05
    priority: high
    depends_on: [T-009, T-011, T-012]
    acceptance_criteria:
      - Kalender menampilkan bulan dengan navigasi prev/next
      - Tanggal dengan agenda ditandai
      - Klik tanggal menampilkan daftar agenda di tanggal tersebut
      - Konten kalender berbeda per role (Admin lihat semua, Pengawas lihat
        agendanya, Operator lihat agenda sekolahnya)
    status: pending

  - id: T-019
    title: Filter Dashboard berdasarkan Sekolah & Pengawas
    description: >
      Tambahkan filter dropdown (Sekolah & Pengawas) di dashboard yang
      memengaruhi tampilan kalender dan daftar agenda. Filter ini tersedia
      untuk Admin (lihat semua) dan Pengawas (filter untuk memfilter).
    epic: E-05
    priority: medium
    depends_on: [T-018]
    acceptance_criteria:
      - Dropdown filter Sekolah menampilkan daftar sekolah
      - Dropdown filter Pengawas menampilkan daftar pengawas
      - Kalender dan daftar agenda berubah sesuai filter yang dipilih
      - Filter dapat di-reset ke default
    status: pending

  - id: T-020
    title: Generate & Download Laporan Agenda PDF
    description: >
      Implementasi generate laporan PDF untuk agenda menggunakan DomPDF.
      Laporan menampilkan detail agenda: judul, deskripsi, tanggal, peserta,
      sekolah, dan daftar dokumentasi. Sediakan tombol download di halaman
      detail agenda.
    epic: E-05
    priority: medium
    depends_on: [T-009]
    acceptance_criteria:
      - Tombol download PDF tersedia di detail agenda
      - PDF menampilkan semua informasi agenda
      - PDF dapat di-download dan dibuka dengan benar
      - Format PDF rapi dan siap cetak
    status: pending
